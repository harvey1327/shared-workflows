name: shared-ci

on:
  workflow_call:

jobs:
  rollout:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generate.outputs.result }}
    steps:
      - name: generate
        id: generate
        run: echo "result=1" >> $GITHUB_OUTPUT
  
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate-workflow
        id: generate
        run: |
          ls -ltr
          ls -ltr ..
          ls -ltr ../..
          ls -ltr ../../..
          pwd
          cat <<'EOF' >> ./.github/workflows/dynamic-workflow.yml
                - name: hello-world
                  run: echo "Hello World"
          EOF

  dw:
    needs: generate
    uses: ./.github/workflows/dynamic-workflow.yml

  dw1:
    needs: rollout
    if: ${{ needs.rollout.outputs.version == 1 }}
    uses: ./.github/workflows/dynamic-workflow-1.yml
  
  dw2:
    needs: rollout
    if: ${{ needs.rollout.outputs.version == 2 }}
    uses: ./.github/workflows/dynamic-workflow-2.yml
