name: shared-ci

on:
  workflow_call:

jobs:
  rollout:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generate.outputs.result }}
    steps:
      - name: generate
        id: generate
        run: echo "result=1" >> $GITHUB_OUTPUT

  dispatchEvent:
    runs-on: ubuntu-latest
    needs: rollout
    env:
      WORKFLOW: dynamic-workflow-${{ needs.rollout.outputs.version }}
    steps:
      - name: run
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/harvey1327/shared-workflows/actions/workflows/${WORKFLOW}/dispatches \
            -d '{"ref": "main"}'
  
  generate:
    needs: rollout
    runs-on: ubuntu-latest
    steps:
      - name: generate-workflow
        id: generate
        run: |
          ls -altr /home/runner/work
          ls -altr /home/runner/actions-runner
          # find / -name "*.yml"
          # find / -name "*.yaml"
          pwd
          cat <<'EOF' >> ./.github/workflows/dynamic-workflow.yml
                - name: hello-world
                  run: echo "Hello World"
          EOF

  dw:
    needs: generate
    uses: ./.github/workflows/dynamic-workflow.yml

  dw1:
    needs: rollout
    if: ${{ needs.rollout.outputs.version == 1 }}
    uses: ./.github/workflows/dynamic-workflow-1.yml
  
  dw2:
    needs: rollout
    if: ${{ needs.rollout.outputs.version == 2 }}
    uses: ./.github/workflows/dynamic-workflow-2.yml
